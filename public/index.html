ㅣ<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINYLIX</title>
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
  --a1:#a259ff;--a2:#4fc3f7;--a3:#f06292;--text:#e0e0f0;--sub:#888aa0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(162,89,255,.15),transparent 70%);top:-100px;left:-100px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(79,195,247,.12),transparent 70%);bottom:-80px;right:-80px;pointer-events:none;z-index:0}

#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.login-logo{font-size:3rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,var(--a1),var(--a2),var(--a3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{color:var(--sub);font-size:1rem}
.login-btn{padding:16px 40px;border-radius:50px;border:none;cursor:pointer;font-size:1rem;font-weight:700;
  background:linear-gradient(135deg,#1db954,#1aa34a);color:#fff;letter-spacing:1px;
  box-shadow:0 4px 24px rgba(29,185,84,.4);transition:transform .2s}
.login-btn:hover{transform:scale(1.05)}
.login-note{color:var(--sub);font-size:.8rem;text-align:center;max-width:300px;line-height:1.6}

header{position:sticky;top:0;z-index:100;background:rgba(10,10,20,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:20px;user-select:none}
.sw input{user-select:text}
.logo{font-size:1.5rem;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--a1),var(--a2),var(--a3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  user-select:none;-webkit-user-drag:none}
.sw{flex:1;max-width:400px;position:relative}
.sw input{width:100%;padding:10px 16px 10px 40px;background:rgba(255,255,255,.07);
  border:1px solid var(--border);border-radius:50px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
.sw input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(162,89,255,.15)}
.sw input::placeholder{color:var(--sub)}
.si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--sub);cursor:pointer;z-index:1;transition:color .2s}
.si:hover{color:var(--a1)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.user-info{display:flex;align-items:center;gap:8px}
.user-img{width:32px;height:32px;border-radius:50%;border:2px solid var(--a1)}
.user-name{font-size:.85rem;font-weight:600}
.tt-btn{padding:10px 22px;border-radius:50px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-weight:700;font-size:.85rem;
  letter-spacing:1px;box-shadow:0 4px 20px rgba(162,89,255,.4);transition:transform .2s}
.tt-btn:hover{transform:scale(1.05)}

main{padding:32px;position:relative;z-index:1}
.sec-title{font-size:1.6rem;font-weight:800;margin-bottom:8px;
  background:linear-gradient(90deg,#fff,var(--sub));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sec-sub{color:var(--sub);font-size:.85rem;margin-bottom:24px}

.genre-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.gtab{padding:8px 20px;border-radius:50px;border:1px solid var(--border);background:var(--card);
  color:var(--sub);cursor:pointer;font-size:.85rem;transition:all .2s;user-select:none}
.gtab:hover{border-color:var(--a1);color:var(--text)}
.gtab.active{background:linear-gradient(135deg,var(--a1),var(--a2));border-color:transparent;
  color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(162,89,255,.4)}

.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}
.track-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px;cursor:grab;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden}
.track-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:rgba(162,89,255,.4)}
.track-card.dragging{opacity:.4;cursor:grabbing}
.track-card.active-card{border-color:var(--a1);box-shadow:0 0 24px rgba(162,89,255,.35)}

/* 앨범 아트 크게 */
.tart{width:100%;aspect-ratio:1;border-radius:12px;margin-bottom:14px;position:relative;overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.tart img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
.track-card:hover .tart img{transform:scale(1.06)}
.tart-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;border-radius:12px}
.tart:hover .play-overlay{opacity:1}
.play-overlay span{font-size:2.5rem}

.track-title{font-weight:700;font-size:.95rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{color:var(--sub);font-size:.8rem;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:.68rem;padding:3px 10px;border-radius:50px;font-weight:600;color:#fff}
.drag-hint{font-size:.63rem;color:var(--a1);margin-top:6px;opacity:.7}
.now-badge{position:absolute;top:10px;right:10px;background:var(--a1);color:#fff;
  font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:50px;z-index:5;
  box-shadow:0 2px 8px rgba(162,89,255,.5)}

.genre-section{margin-bottom:48px}
.genre-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.genre-icon{font-size:1.8rem}
.genre-name{font-size:1.2rem;font-weight:800}
.genre-count{color:var(--sub);font-size:.85rem}
.no-results{text-align:center;padding:60px;color:var(--sub)}

/* TURNTABLE */
#ttWin{position:fixed;top:80px;right:30px;width:360px;
  background:rgba(10,10,20,.97);border:1px solid rgba(162,89,255,.3);border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 40px rgba(162,89,255,.15);
  z-index:500;display:none;flex-direction:column;backdrop-filter:blur(24px);overflow:hidden;user-select:none}
#ttWin.vis{display:flex}
.tth{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:move;
  background:linear-gradient(90deg,rgba(162,89,255,.1),rgba(79,195,247,.08))}
.tth-title{font-weight:800;font-size:.95rem;letter-spacing:1px;
  background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tth-close{background:none;border:none;color:var(--sub);cursor:pointer;font-size:1.1rem;padding:4px}
.tth-close:hover{color:var(--a3)}
.ttb{padding:18px;display:flex;flex-direction:column;align-items:center;gap:12px}

.tt-stage{position:relative;width:270px;height:270px}
.tt-base{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#2a1a3e,#0d0d18);
  box-shadow:0 8px 32px rgba(0,0,0,.8),inset 0 2px 4px rgba(255,255,255,.05)}
.tt-ring{position:absolute;top:50%;left:50%;width:238px;height:238px;transform:translate(-50%,-50%);
  border-radius:50%;border:2px solid rgba(162,89,255,.2);pointer-events:none}
.tt-lp{position:absolute;top:50%;left:50%;width:212px;height:212px;transform:translate(-50%,-50%);cursor:crosshair;
  border-radius:50%;transition:background .5s;
  background:conic-gradient(from 0deg,#111 0deg,#1a1a1a 15deg,#0d0d0d 30deg,#1a1a1a 45deg,
    #0d0d0d 60deg,#111 75deg,#1a1a1a 90deg,#0d0d0d 120deg,#1a1a1a 150deg,
    #111 180deg,#1a1a1a 210deg,#0d0d0d 240deg,#1a1a1a 270deg,
    #111 300deg,#1a1a1a 330deg,#111 360deg);
  box-shadow:0 0 30px rgba(0,0,0,.9),inset 0 0 60px rgba(0,0,0,.5)}
.tt-lp::before{content:'';position:absolute;inset:10px;border-radius:50%;
  box-shadow:0 0 0 10px rgba(255,255,255,.025),0 0 0 22px rgba(255,255,255,.02),
    0 0 0 34px rgba(255,255,255,.02),0 0 0 46px rgba(255,255,255,.015),
    0 0 0 58px rgba(255,255,255,.015),0 0 0 70px rgba(255,255,255,.01)}
.tt-lp.spin{animation:lpSpin 2s linear infinite}
@keyframes lpSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.tt-label{position:absolute;top:50%;left:50%;width:70px;height:70px;
  transform:translate(-50%,-50%);border-radius:50%;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(162,89,255,.5)}
.tt-label img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.tt-label-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;background:conic-gradient(from 0deg,var(--a1),var(--a3),var(--a2),var(--a1))}
.tt-label::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;
  background:#111;box-shadow:inset 0 1px 2px rgba(0,0,0,.8)}
.tt-dz{position:absolute;top:50%;left:50%;width:212px;height:212px;
  transform:translate(-50%,-50%);border-radius:50%;
  border:3px dashed transparent;transition:border-color .2s,box-shadow .2s;z-index:10;pointer-events:none}
.tt-dz.over{border-color:var(--a2);box-shadow:0 0 30px rgba(79,195,247,.4),inset 0 0 30px rgba(79,195,247,.1);pointer-events:auto}
.tt-dz-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--a2);font-size:.75rem;font-weight:700;opacity:0;transition:opacity .2s;white-space:nowrap}
.tt-dz.over .tt-dz-txt{opacity:1}

.tonearm{position:absolute;top:10px;right:12px;width:106px;height:136px;
  transform-origin:88px 18px;transform:rotate(-30deg);
  transition:transform .9s cubic-bezier(.25,.46,.45,.94);z-index:20;cursor:grab}
.tonearm.on{transform:rotate(0deg)}
.tonearm.arm-drag{cursor:grabbing}
.tonearm svg{width:100%;height:100%}

.prog-wrap{width:100%;display:flex;align-items:center;gap:8px}
.prog-time{font-size:.7rem;color:var(--sub);min-width:30px}
.prog-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a1),var(--a2));width:0%}

.tt-info{width:100%;text-align:center;min-height:52px}
.tt-np{font-size:.65rem;color:var(--a1);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.tt-track{font-weight:800;font-size:.93rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-artist{color:var(--sub);font-size:.78rem}
.tt-hint{color:var(--sub);font-size:.8rem;font-style:italic}

.tt-ctrl{display:flex;align-items:center;gap:14px;justify-content:center}
.cb{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:50%;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);font-size:1rem;transition:all .2s}
.cb:hover{background:rgba(162,89,255,.2);border-color:var(--a1)}
.cb.play{width:50px;height:50px;font-size:1.2rem;
  background:linear-gradient(135deg,var(--a1),var(--a2));border:none;box-shadow:0 4px 20px rgba(162,89,255,.4)}
.cb.play:hover{transform:scale(1.08)}

.vol-row{display:flex;align-items:center;gap:8px;width:100%;padding:0 4px}
.vol-row span{color:var(--sub)}
.vol-row input{flex:1;accent-color:var(--a1);cursor:pointer}

.sp-badge{display:flex;align-items:center;gap:6px;font-size:.7rem;color:#1db954;font-weight:600}
.sp-dot{width:8px;height:8px;border-radius:50%;background:#1db954;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(162,89,255,.3);border-radius:3px}
.hidden{display:none!important}

.search-section{margin-bottom:40px}
.artist-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;cursor:pointer;transition:transform .2s,border-color .2s;
  display:flex;align-items:center;gap:14px}
.artist-card:hover{transform:translateY(-3px);border-color:rgba(162,89,255,.4)}
.a-img{width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,#a259ff,#4fc3f7);display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.a-img img{width:100%;height:100%;object-fit:cover;display:block}
.album-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px;cursor:pointer;transition:transform .2s,border-color .2s}
.album-card:hover{transform:translateY(-4px);border-color:rgba(162,89,255,.4)}
.al-art{width:100%;aspect-ratio:1;border-radius:10px;margin-bottom:10px;overflow:hidden;
  background:linear-gradient(135deg,#4fc3f7,#a259ff);display:flex;align-items:center;justify-content:center;font-size:3rem}
.al-art img{width:100%;height:100%;object-fit:cover;display:block}
.load-more-btn{margin-top:12px;padding:8px 24px;border-radius:50px;border:1px solid var(--a1);
  background:transparent;color:var(--a1);cursor:pointer;font-size:.82rem;font-weight:600;
  transition:all .2s}
.load-more-btn:hover{background:rgba(162,89,255,.15)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">🎵 VINYLIX</div>
  <div class="login-sub">LP 턴테이블 음원 스트리밍</div>
  <button class="login-btn" onclick="location.href='/api/login'">▶ &nbsp; Spotify로 시작하기</button>
  <div class="login-note">Spotify 프리미엄 계정이 필요해요.<br>로그인하면 실제 음원이 LP에서 재생돼요 🎶</div>
</div>

<header>
  <div class="logo" onclick="goHome()" style="cursor:pointer">🎵 VINYLIX</div>
  <div class="sw">
    <span class="si" id="searchBtn">🔍</span>
    <input type="text" id="searchInput" placeholder="곡, 아티스트 검색..." autocomplete="off">
  </div>
  <div class="header-right">
    <div class="user-info" id="userInfo" style="display:none">
      <img class="user-img" id="userImg" src="" alt="">
      <span class="user-name" id="userName"></span>
    </div>
    <button class="tt-btn" onclick="toggleTT()">🎛️ 턴테이블 열기</button>
  </div>
</header>

<main>
  <div class="sec-title">음악을 탐색하세요</div>
  <div class="sec-sub">카드를 턴테이블 LP 위로 드래그하면 실제 음원이 재생돼요 🎶</div>
  <div class="genre-tabs">
    <div class="gtab active" onclick="fg('all',this)">전체</div>
    <div class="gtab" onclick="fg('kpop',this)">팝 / K-POP</div>
    <div class="gtab" onclick="fg('hiphop',this)">힙합 / R&B</div>
    <div class="gtab" onclick="fg('rock',this)">록 / 메탈</div>
    <div class="gtab" onclick="fg('jazz',this)">재즈 / 클래식</div>
    <div class="gtab" onclick="fg('edm',this)">일렉트로닉 / EDM</div>
    <div class="gtab" onclick="fg('indie',this)">인디 / 어쿠스틱</div>
  </div>
  <div id="content"></div>
</main>

<div id="ttWin">
  <div class="tth" id="ttH">
    <span class="tth-title">🎛️ TURNTABLE</span>
    <div class="sp-badge"><div class="sp-dot"></div>Spotify</div>
    <button class="tth-close" onclick="toggleTT()">✕</button>
  </div>
  <div class="ttb">
    <div class="tt-stage" id="ttStage">
      <div class="tt-base"></div><div class="tt-ring"></div>
      <div class="tt-lp" id="ttLp">
        <div class="tt-label" id="ttLabel">
          <div class="tt-label-fallback" id="ttLabelFallback">🎵</div>
        </div>
      </div>
      <div class="tt-dz" id="ttDz"><div class="tt-dz-txt">LP에 드롭!</div></div>
      <div class="tonearm" id="tonearm">
        <svg viewBox="0 0 110 140" fill="none">
          <circle cx="90" cy="20" r="12" fill="url(#p1)"/>
          <circle cx="90" cy="20" r="6" fill="#2a1a3e"/>
          <circle cx="90" cy="20" r="2" fill="#a259ff"/>
          <path d="M90 28 Q70 60 40 110 Q36 118 30 122" stroke="url(#p2)" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M26 118 L18 130 L36 134 L40 120 Z" fill="url(#p3)"/>
          <line x1="28" y1="130" x2="24" y2="142" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="24" cy="142" r="2" fill="#f06292"/>
          <defs>
            <linearGradient id="p1" x1="78" y1="8" x2="102" y2="32"><stop offset="0%" stop-color="#c8a0ff"/><stop offset="100%" stop-color="#5a3080"/></linearGradient>
            <linearGradient id="p2" x1="90" y1="28" x2="30" y2="122"><stop offset="0%" stop-color="#b070ff"/><stop offset="100%" stop-color="#4fc3f7"/></linearGradient>
            <linearGradient id="p3" x1="18" y1="118" x2="40" y2="134"><stop offset="0%" stop-color="#9060d0"/><stop offset="100%" stop-color="#3a9abf"/></linearGradient>
          </defs>
        </svg>
      </div>
    </div>

    <div class="tt-info">
      <div class="tt-hint" id="ttHint">카드를 LP 위로 드래그하세요 🎶</div>
      <div id="ttNP" class="hidden">
        <div class="tt-np">▶ NOW PLAYING</div>
        <div class="tt-track" id="ttTitle">-</div>
        <div class="tt-artist" id="ttArtist">-</div>
      </div>
    </div>

    <div class="prog-wrap" id="progWrap" style="display:none">
      <span class="prog-time" id="curTime">0:00</span>
      <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
      <span class="prog-time" id="durTime">0:00</span>
    </div>

    <div class="tt-ctrl">
      <button class="cb" onclick="prevTrack()">⏮</button>
      <button class="cb play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="cb" onclick="nextTrack()">⏭</button>
    </div>
    <div class="vol-row">
      <span>🔈</span>
      <input type="range" min="0" max="100" value="80" id="volSlider" oninput="setVol(this.value)">
      <span>🔊</span>
    </div>
  </div>
</div>

<script>
var accessToken = null, refreshToken = null, deviceId = null;
var player = null, curTrack = null, isPlaying = false, curGenre = 'all', queue = [];
var trackMap = {};
var armDragging = false, lpSeekDragging = false;
var searchCache = {query:'',tracks:[],artists:[],albums:[],trackNext:null,artistNext:null,albumNext:null,trackTotal:0,artistTotal:0,albumTotal:0};

(function() {
  const params = new URLSearchParams(location.search);
  if (params.get('access_token')) {
    accessToken = params.get('access_token');
    refreshToken = params.get('refresh_token');
    history.replaceState({}, '', '/');
    document.getElementById('loginScreen').style.display = 'none';
    fetchUserProfile();
  }
})();

async function fetchUserProfile() {
  const res = await fetch('https://api.spotify.com/v1/me', {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('userName').textContent = data.display_name;
  if (data.images && data.images[0])
    document.getElementById('userImg').src = data.images[0].url;
}

window.onSpotifyWebPlaybackSDKReady = () => {
  if (!accessToken) return;
  player = new Spotify.Player({
    name: 'VINYLIX Turntable',
    getOAuthToken: cb => cb(accessToken),
    volume: 0.8
  });
  player.addListener('ready', ({ device_id }) => { deviceId = device_id; });
  player.addListener('not_ready', () => { deviceId = null; });
  player.addListener('initialization_error', ({ message }) => { alert('플레이어 초기화 오류: ' + message); });
  player.addListener('authentication_error', ({ message }) => { alert('인증 오류: ' + message); });
  player.addListener('account_error', () => { alert('Spotify Premium 계정이 필요합니다.'); });
  player.addListener('player_state_changed', state => {
    if (!state) return;
    const track = state.track_window.current_track;
    isPlaying = !state.paused;
    document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
    document.getElementById('ttLp').classList.toggle('spin', isPlaying);
    if (track.album.images[0]) {

        `<img src="${track.album.images[0].url}" alt=""><div style="position:absolute;width:10px;height:10px;border-radius:50%;background:#111"></div>`;
    }

    updateProgress(state);
    updateCards();
    const _arm = document.getElementById('tonearm');

    if (!state.paused && _a < -15) updateArmAngle(state.position / state.duration);
  });
  player.connect();
};

async function playSpotifyTrack(spotifyUri, track) {
  if (!deviceId) { alert('Spotify 플레이어 준비 중이에요. 잠시 후 다시 시도해주세요!'); return; }
  const [c1, c2] = track.color;
  document.getElementById('ttLp').style.background =
    `conic-gradient(from 0deg,${c1}55 0deg,${c2}33 45deg,${c1}44 90deg,${c2}22 135deg,
     ${c1}55 180deg,${c2}33 225deg,${c1}44 270deg,${c2}22 315deg,${c1}55 360deg)`;
  document.getElementById('ttHint').classList.add('hidden');
  document.getElementById('ttNP').classList.remove('hidden');
  document.getElementById('ttTitle').textContent = track.title;
  document.getElementById('ttArtist').textContent = track.artist;
  const arm = document.getElementById('tonearm');
  arm.style.transition = 'transform .9s cubic-bezier(.25,.46,.45,.94)';
  arm.style.transform = 'rotate(-30deg)';
  setTimeout(async () => {
    arm.style.transform = 'rotate(0deg)';
    const res = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uris: [spotifyUri] })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: { message: res.status } }));
      alert('재생 오류: ' + (err.error?.message || res.status));
    }
  }, 900);
}

async function prevTrack() {
  if (!curTrack || !queue.length) return;
  const i = queue.findIndex(x => x.id === curTrack.id);
  curTrack = queue[(i - 1 + queue.length) % queue.length];
  playSpotifyTrack(curTrack.spotifyUri, curTrack);
}
async function nextTrack() {
  if (!curTrack || !queue.length) return;
  const i = queue.findIndex(x => x.id === curTrack.id);
  curTrack = queue[(i + 1) % queue.length];
  playSpotifyTrack(curTrack.spotifyUri, curTrack);
}

(function(){
  const arm = document.getElementById('tonearm');
  const stage = document.getElementById('ttStage');
  let startX = 0, startAngle = 0;

  function readAngle() {
    const t = getComputedStyle(arm).transform;
    if (!t || t === 'none') return -30;
    const m = t.match(/matrix\((-?[\d.]+),\s*(-?[\d.]+)/);
    return m ? Math.round(Math.atan2(parseFloat(m[2]), parseFloat(m[1])) * 180 / Math.PI) : -30;
  }

  arm.addEventListener('mousedown', e => {
    if (!deviceId || !curTrack || lpSeekDragging) return;
    startAngle = readAngle();
    startX = e.clientX;
    armDragging = true;
    arm.classList.add('arm-drag');
    arm.style.transition = 'none';
    arm.style.transform = `rotate(${startAngle}deg)`;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!armDragging) return;
    const newAngle = Math.max(-35, Math.min(25, startAngle + (e.clientX - startX) * 0.2));
    arm.style.transform = `rotate(${newAngle}deg)`;
  });

  document.addEventListener('mouseup', async () => {
    if (!armDragging) return;
    armDragging = false;
    arm.classList.remove('arm-drag');
    if (!player) return;
    const angle = parseFloat(arm.style.transform.replace(/[^-\d.]/g, '') || '0');
    if (angle < -15) {
      arm.style.transition = 'transform .9s cubic-bezier(.25,.46,.45,.94)';
      arm.style.transform = 'rotate(-30deg)';
      if (isPlaying) await player.pause();
    } else {
      const progress = Math.max(0, Math.min(1, angle / 22));
      const state = await player.getCurrentState();
      if (state) {
        await player.seek(Math.floor(progress * state.duration));
        arm.style.transition = 'transform .3s ease';
        if (!isPlaying) await player.resume();
      }
    }
  });
})();

(function(){
  const lp = document.getElementById('ttLp');

  function getProgress(e) {
    const rect = lp.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const r = Math.sqrt((e.clientX - cx) ** 2 + (e.clientY - cy) ** 2);
    const outer = rect.width / 2 - 6;   // ~100px (outer groove)
    const inner = rect.width * 0.16;     // ~34px (label edge)
    return Math.max(0, Math.min(1, (outer - r) / (outer - inner)));
  }

  lp.addEventListener('mousedown', e => {
    if (!player || !curTrack || armDragging) return;
    lpSeekDragging = true;
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('mousemove', e => {
    if (!lpSeekDragging) return;
    updateArmAngle(getProgress(e));
  });

  document.addEventListener('mouseup', async e => {
    if (!lpSeekDragging) return;
    lpSeekDragging = false;
    const progress = getProgress(e);
    const state = await player?.getCurrentState();
    if (state) {
      await player.seek(Math.floor(progress * state.duration));
      updateArmAngle(progress);
      if (!isPlaying) await player.resume();
    }
  });
})();

async function searchSpotify(q) {
  document.getElementById('content').innerHTML = `<div class="no-results"><div style="font-size:2rem">🔍</div><p>"${q}" 검색 중...</p></div>`;
  const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track,artist,album`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('content').innerHTML = `<div class="no-results"><p>검색 오류 ${res.status}: ${err.error?.message || '알 수 없는 오류'}</p></div>`;
    if (res.status === 401) { accessToken = null; document.getElementById('loginScreen').style.display = 'flex'; }
    return;
  }
  const data = await res.json();
  searchCache = {
    query: q,
    tracks: data.tracks?.items || [],
    artists: data.artists?.items || [],
    albums: data.albums?.items || [],
    trackNext: data.tracks?.next || null,
    artistNext: data.artists?.next || null,
    albumNext: data.albums?.next || null,
    trackTotal: data.tracks?.total || 0,
    artistTotal: data.artists?.total || 0,
    albumTotal: data.albums?.total || 0,
  };
  renderSearchPage();
}

function fmtFollowers(n) {
  if (!n) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M 팔로워';
  if (n >= 1000) return Math.round(n/1000) + 'K 팔로워';
  return n + ' 팔로워';
}

function artistCard(a) {

  return `<div class="artist-card" data-id="${a.id}" data-name="${safeName}">

    <div><div class="track-title">${a.name}</div><div class="track-artist">${followers}</div></div>

  document.getElementById('content').innerHTML = `<div class="search-section">
    <div class="genre-header" style="margin-bottom:14px">
      <button onclick="renderSearchPage()" style="background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--sub);font-size:.9rem;line-height:1">←</button>
      <span class="genre-icon">🎤</span>
      <span class="genre-name">${artistName}</span>
      <span class="genre-count">${results.length}곡</span>
    </div>
    <div class="track-grid">${results.map(trackCard).join('')}</div>
  </div>`;
  attachDrag();
}

async function loadAlbumTracks(albumId, albumName) {
  document.getElementById('content').innerHTML = `<div class="no-results"><div style="font-size:2rem">💿</div><p>"${albumName}" 트랙 불러오는 중...</p></div>`;
  const [tracksRes, albumRes] = await Promise.all([
    fetch(`https://api.spotify.com/v1/albums/${albumId}/tracks`, { headers:{ Authorization:`Bearer ${accessToken}` } }),
    fetch(`https://api.spotify.com/v1/albums/${albumId}`, { headers:{ Authorization:`Bearer ${accessToken}` } })
  ]);
  if (!tracksRes.ok) { document.getElementById('content').innerHTML = `<div class="no-results"><p>앨범 트랙을 불러올 수 없어요</p></div>`; return; }
  const [tData, aData] = await Promise.all([tracksRes.json(), albumRes.ok ? albumRes.json() : Promise.resolve(null)]);
  const albumArt = aData?.images?.[1]?.url || aData?.images?.[0]?.url || '';
  const results = (tData.items||[]).map((item,i) => {
    const t = {id:`sp_al_${i}`, title:item.name, artist:item.artists.map(a=>a.name).join(', '),
      genre:'search', emoji:'💿', color:['#4fc3f7','#a259ff'],
      spotifyUri:item.uri, albumArt};
    trackMap[t.id] = t;
    return t;
  });
  document.getElementById('content').innerHTML = `<div class="search-section">
    <div class="genre-header" style="margin-bottom:14px">
      <button onclick="renderSearchPage()" style="background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--sub);font-size:.9rem;line-height:1">←</button>
      <span class="genre-icon">💿</span>
      <span class="genre-name">${albumName}</span>
      <span class="genre-count">${results.length}곡</span>
    </div>
    <div class="track-grid">${results.map(trackCard).join('')}</div>
  </div>`;
  attachDrag();
}

async function loadMore(type) {
  const nextKey = type + 'Next';
  const nextUrl = searchCache[nextKey];
  if (!nextUrl) return;
  const res = await fetch(nextUrl, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!res.ok) return;
  const data = await res.json();
  const cacheKey = type + 's';
  searchCache[cacheKey] = [...searchCache[cacheKey], ...(data[cacheKey]?.items || [])];
  searchCache[nextKey] = data[cacheKey]?.next || null;
  renderSearchPage();
}

function goHome() {
  document.getElementById('searchInput').value = '';
  curGenre = 'all';
  document.querySelectorAll('.gtab').forEach(t => t.classList.remove('active'));
  document.querySelector('.gtab').classList.add('active');
  renderContent('all', '');
}

function fg(g, el) {
  document.getElementById('searchInput').value = '';
  curGenre = g;
  document.querySelectorAll('.gtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderContent(g, '');
}

renderContent();
</script>
</body>
</html>
